name: Grinda CI

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: "10.0.x"
            - name: Restore
              run: dotnet restore backend/Grinda.sln
            - name: Build
              run: dotnet build backend/Grinda.sln --no-restore --configuration Release

    test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                dotnet-version: "10.0.x"
            - name: Restore
              run: dotnet restore backend/Grinda.sln
            - name: Test
              run: dotnet test backend/Grinda.sln --no-build --verbosity normal

